<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link-Building Profitability Dashboard</title>
  <link rel="stylesheet" href="./reporting_app.css" />
</head>
<body>
  <main class="container">
    <h1>Link-Building Profitability Reporting Layer</h1>

    <section class="panel">
      <h2>Global Date Filter</h2>
      <div class="grid-2">
        <label>Start Date <input id="startDate" type="date" /></label>
        <label>End Date <input id="endDate" type="date" /></label>
      </div>
      <div class="actions">
        <button id="loadMockDataBtn" type="button">Load Mock Data</button>
        <button id="recalculateBtn" type="button">Recalculate Dashboard</button>
      </div>
      <p class="hint">All three report sections are recalculated from these dates.</p>
    </section>

    <section class="panel">
      <h2>Input: Operations Period</h2>
      <form id="operationsForm" class="grid-4">
        <input name="period_name" placeholder="Period Name" required />
        <input name="period_start" type="date" required />
        <input name="period_end" type="date" required />
        <input name="lead_count" type="number" min="0" placeholder="Leads" required />
        <input name="labor_cost" type="number" min="0" step="0.01" placeholder="Labor" required />
        <input name="tools_cost" type="number" min="0" step="0.01" placeholder="Tools" required />
        <input name="overhead_cost" type="number" min="0" step="0.01" placeholder="Overhead" required />
        <button type="submit">Add Period</button>
      </form>
      <table id="operationsTable"></table>
    </section>

    <section class="panel">
      <h2>Input: URLs</h2>
      <form id="urlForm" class="grid-3">
        <input name="canonical_url" type="url" placeholder="https://example.com/page" required />
        <input name="campaign_name" placeholder="Campaign (optional)" />
        <button type="submit">Add URL</button>
      </form>
      <table id="urlsTable"></table>
    </section>

    <section class="panel">
      <h2>Input: Links</h2>
      <form id="linkForm" class="grid-4">
        <input name="url_id" type="number" min="1" placeholder="URL ID" required />
        <input name="period_id" type="number" min="1" placeholder="Period ID" required />
        <input name="source_domain" placeholder="Source Domain" required />
        <input name="placement_date" type="date" required />
        <input name="direct_link_cost" type="number" min="0" step="0.01" placeholder="Direct Cost" required />
        <input name="sessions" type="number" min="0" placeholder="Sessions" required />
        <input name="allocation_weight" type="number" min="0" step="0.0001" placeholder="Allocation Weight" value="1" required />
        <button type="submit">Add Link</button>
      </form>
      <table id="linksTable"></table>
    </section>

    <section class="panel">
      <h2>Input: Link Attribution</h2>
      <form id="attributionForm" class="grid-4">
        <input name="link_id" type="number" min="1" placeholder="Link ID" required />
        <input name="conversion_event_id" placeholder="Unique Conversion Event ID" required />
        <input name="conversion_date" type="date" required />
        <input name="conversions" type="number" min="0" placeholder="Conversions" value="1" required />
        <input name="revenue" type="number" min="0" step="0.01" placeholder="Revenue" required />
        <input name="first_time_deposit_count" type="number" min="0" placeholder="FTDs" value="0" required />
        <input name="attribution_weight" type="number" min="0" step="0.0001" value="1" placeholder="Attribution Weight" required />
        <button type="submit">Add Attribution</button>
      </form>
      <p id="attributionError" class="error"></p>
      <table id="attributionTable"></table>
    </section>

    <section class="panel">
      <h2>1) Operations Summary</h2>
      <table id="summaryTable"></table>
    </section>

    <section class="panel">
      <h2>2) Link-Level Performance</h2>
      <table id="linkPerfTable"></table>
    </section>

    <section class="panel">
      <h2>3) URL-Level Performance</h2>
      <table id="urlPerfTable"></table>
    </section>
  </main>

  <script src="./reporting_app.js"></script>
</body>
</html>
